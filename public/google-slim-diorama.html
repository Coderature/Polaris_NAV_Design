<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Slim Cell Diorama v2 · Maps Pin + Cloud Edition</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 18%, #1e2630 0%, #0c1118 58%, #060810 100%);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, Helvetica, sans-serif;
    }
    #hud {
      position: fixed;
      left: 20px;
      top: 18px;
      z-index: 10;
      color: #f3f7ff;
      background: rgba(8, 12, 16, 0.78);
      border: 1px solid rgba(66, 133, 244, 0.5);
      border-radius: 16px;
      padding: 13px 15px;
      line-height: 1.45;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      pointer-events: none;
    }
    #hud b { color: #4285f4; font-size: 18px; }
    #hud span { color: #c7d9ff; font-size: 13px; }
    #tip {
      position: fixed;
      right: 20px;
      bottom: 18px;
      z-index: 10;
      color: #1a73e8;
      background: rgba(245, 248, 255, .92);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      box-shadow: 0 14px 30px rgba(0,0,0,.3);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <b>구글 1셀 슬림 디오라마 v2</b><br />
    <span>Maps Pin · Cloud · YouTube · Android · Google 4색</span>
  </div>
  <div id="tip">드래그 회전 · 휠 확대 · 우클릭 이동</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const GROUND_XZ = 1.25;
    const gx = (n) => n * GROUND_XZ;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a1218');
    scene.fog = new THREE.Fog('#0a1218', 11, 26);

    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(6.0, 5.0, 6.7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.2, 1.55, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 4;
    controls.maxDistance = 13;
    controls.maxPolarAngle = Math.PI * 0.49;

    const C = {
      googleBlue: '#4285f4',
      googleRed: '#ea4335',
      googleYellow: '#fbbc04',
      googleGreen: '#34a853',
      youtubeRed: '#ff0000',
      androidGreen: '#3ddc84',
      white: '#f4f4f4',
      silver: '#cfd4dc',
      metal: '#999999',
      darkMetal: '#555555',
      glass: '#a0c8f5',
      glassDark: '#1a2a3a',
      warm: '#fff2c8',
      base: '#0f1620',
      platform: '#dadee5',
      road: '#1e242a',
      grass: '#4a8c52'
    };

    const mat = (color, o = {}) => new THREE.MeshStandardMaterial({
      color,
      roughness: o.roughness ?? 0.6,
      metalness: o.metalness ?? 0.05,
      transparent: o.transparent ?? false,
      opacity: o.opacity ?? 1,
      emissive: o.emissive ?? '#000000',
      emissiveIntensity: o.emissiveIntensity ?? 0
    });

    const M = {
      googleBlue: mat(C.googleBlue, { roughness: .4, metalness: .15, emissive: '#1a5fff', emissiveIntensity: .15 }),
      googleRed: mat(C.googleRed, { roughness: .4, metalness: .1, emissive: '#c01b1b', emissiveIntensity: .15 }),
      googleYellow: mat(C.googleYellow, { roughness: .4, metalness: .1, emissive: '#c08a00', emissiveIntensity: .2 }),
      googleGreen: mat(C.googleGreen, { roughness: .4, metalness: .1, emissive: '#1e7a35', emissiveIntensity: .15 }),
      youtubeRed: mat(C.youtubeRed, { roughness: .25, metalness: .1, emissive: '#ff0000', emissiveIntensity: .4 }),
      androidGreen: mat(C.androidGreen, { roughness: .3, metalness: .15, emissive: '#1ea862', emissiveIntensity: .3 }),
      whiteAccent: mat('#ffffff', { roughness: .6 }),
      silver: mat(C.silver, { roughness: .42, metalness: .35 }),
      darkMetal: mat(C.darkMetal, { roughness: .3, metalness: .8 }),
      glass: mat(C.glass, { roughness: .12, metalness: .1, transparent: true, opacity: .5, emissive: '#3a78d0', emissiveIntensity: .15 }),
      glassDark: mat(C.glassDark, { roughness: .2, metalness: .5 }),
      warmWindow: mat(C.warm, { roughness: .35, emissive: '#ffb93d', emissiveIntensity: .65 }),
      base: mat(C.base, { roughness: .55 }),
      platform: mat(C.platform, { roughness: .78 }),
      road: mat(C.road, { roughness: .82 }),
      grass: mat(C.grass, { roughness: .9 }),
      serverRack: mat('#1a1a1a', { roughness: .3, metalness: .7 }),
      serverLed: mat('#4285f4', { emissive: '#4285f4', emissiveIntensity: 2.5 }),
      mapDataLine: mat('#4285f4', { emissive: '#4285f4', emissiveIntensity: 1.5, transparent: true, opacity: .6 }),
      solarPanel: mat('#1a2a4a', { roughness: .25, metalness: .6, emissive: '#2a5aaa', emissiveIntensity: .4 }),
      skyBeamYt: new THREE.MeshBasicMaterial({ color: '#ff3344', transparent: true, opacity: .3 })
    };

    function box(g, name, x, y, z, sx, sy, sz, material) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), material);
      mesh.name = name;
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      g.add(mesh);
      return mesh;
    }

    function cyl(g, name, x, y, z, r, h, material, radial = 24) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, radial), material);
      mesh.name = name;
      mesh.position.set(x, y + h / 2, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      g.add(mesh);
      return mesh;
    }

    function sphere(g, name, x, y, z, r, material) {
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 24, 16), material);
      mesh.name = name;
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      g.add(mesh);
      return mesh;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function makeGoogleLogoTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 14, 14, canvas.width - 28, canvas.height - 28, 32);
      ctx.fill();
      const text = 'Google';
      const colors = ['#4285f4', '#ea4335', '#fbbc04', '#4285f4', '#34a853', '#ea4335'];
      ctx.font = 'bold 160px Arial, sans-serif';
      ctx.textBaseline = 'middle';
      const widths = text.split('').map(c => ctx.measureText(c).width);
      const totalW = widths.reduce((a, b) => a + b, 0);
      let xPos = canvas.width / 2 - totalW / 2;
      const yPos = canvas.height / 2;
      for (let i = 0; i < text.length; i++) {
        ctx.fillStyle = colors[i];
        ctx.textAlign = 'left';
        ctx.fillText(text[i], xPos, yPos);
        xPos += widths[i];
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeYouTubeLogoTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 384;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 48);
      ctx.fill();
      ctx.strokeStyle = '#dadce0';
      ctx.lineWidth = 4;
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 48);
      ctx.stroke();
      const cy = canvas.height / 2;
      ctx.fillStyle = '#ff0000';
      roundRect(ctx, 72, cy - 72, 144, 144, 28);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(130, cy - 38);
      ctx.lineTo(130, cy + 38);
      ctx.lineTo(188, cy);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#282828';
      ctx.font = 'bold 130px "Arial Black", Arial, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText('YouTube', 260, cy);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeGoogleCloudLogoTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 32);
      ctx.fill();
      const cy = canvas.height / 2;
      ctx.fillStyle = '#4285f4';
      ctx.beginPath();
      ctx.arc(180, cy - 10, 48, 0, Math.PI * 2);
      ctx.arc(240, cy - 24, 56, 0, Math.PI * 2);
      ctx.arc(300, cy - 8, 44, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4285f4';
      ctx.font = 'bold 88px Arial, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText('Google Cloud', 380, cy);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeYouTubeThumbnailTexture(idx) {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 300;
      const ctx = canvas.getContext('2d');
      const gradients = [
        ['#1a3a8a', '#0a2050'],
        ['#8a2a3a', '#502010'],
        ['#3a6a3a', '#1a4020']
      ];
      const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      grad.addColorStop(0, gradients[idx % 3][0]);
      grad.addColorStop(1, gradients[idx % 3][1]);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const ccx = canvas.width / 2;
      const ccy = canvas.height / 2;
      ctx.fillStyle = 'rgba(255, 0, 0, 0.85)';
      roundRect(ctx, ccx - 50, ccy - 35, 100, 70, 18);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(ccx - 16, ccy - 20);
      ctx.lineTo(ccx - 16, ccy + 20);
      ctx.lineTo(ccx + 22, ccy);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      roundRect(ctx, canvas.width - 100, canvas.height - 50, 80, 30, 6);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      const times = ['12:34', '8:45', '15:02'];
      ctx.fillText(times[idx % 3], canvas.width - 60, canvas.height - 30);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeSimpleSign(text, bg, color) {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = bg;
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 24);
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 6;
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 24);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.font = 'bold 110px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function planeWith(texture, x, y, z, w, h, emissiveStrength = 0.3) {
      const material = new THREE.MeshStandardMaterial({
        map: texture, side: THREE.DoubleSide,
        roughness: 0.4, emissive: '#ffffff',
        emissiveMap: texture, emissiveIntensity: emissiveStrength
      });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), material);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      return mesh;
    }

    function createAndroidHead(g, x, y, z, scale = 1) {
      const aGroup = new THREE.Group();
      aGroup.position.set(x, y, z);
      aGroup.scale.setScalar(scale);
      g.add(aGroup);
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2),
        M.androidGreen
      );
      head.castShadow = true;
      aGroup.add(head);
      const headBase = new THREE.Mesh(new THREE.CircleGeometry(0.18, 24), M.androidGreen);
      headBase.rotation.x = Math.PI / 2;
      aGroup.add(headBase);
      [-0.06, 0.06].forEach((ox) => {
        const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.08, 8), M.androidGreen);
        ant.position.set(ox, 0.2, 0);
        ant.rotation.z = ox > 0 ? Math.PI / 8 : -Math.PI / 8;
        aGroup.add(ant);
      });
      [-0.06, 0.06].forEach((ox) => {
        const eye = new THREE.Mesh(
          new THREE.SphereGeometry(0.018, 12, 8),
          new THREE.MeshBasicMaterial({ color: '#ffffff' })
        );
        eye.position.set(ox, 0.07, 0.16);
        aGroup.add(eye);
      });
      return aGroup;
    }

    function createServerRack(g, x, y, z) {
      const rack = new THREE.Group();
      rack.position.set(x, y, z);
      g.add(rack);
      box(rack, 'server rack body', 0, 0, 0, 0.2, 0.6, 0.18, M.serverRack);
      const leds = [];
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 3; col++) {
          const led = new THREE.Mesh(
            new THREE.BoxGeometry(0.025, 0.025, 0.005),
            M.serverLed.clone()
          );
          led.position.set(-0.06 + col * 0.06, 0.2 - row * 0.1, 0.095);
          rack.add(led);
          leds.push({ mesh: led, phase: (row * 3 + col) * 0.15 });
        }
      }
      return { group: rack, leds };
    }

    function createMapsPin(g, x, y, z, scale = 1) {
      const pinGroup = new THREE.Group();
      pinGroup.position.set(x, y, z);
      pinGroup.scale.setScalar(scale);
      g.add(pinGroup);

      const shadow = new THREE.Mesh(
        new THREE.CircleGeometry(0.14, 16),
        new THREE.MeshBasicMaterial({ color: '#000000', transparent: true, opacity: 0.22 })
      );
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.y = 0.01;
      pinGroup.add(shadow);

      const pinMat = mat('#ea4335', { roughness: .35, emissive: '#ea4335', emissiveIntensity: .35 });
      const cone = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.18, 16), pinMat);
      cone.position.y = 0.09;
      cone.castShadow = true;
      pinGroup.add(cone);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 12), pinMat);
      head.position.y = 0.22;
      head.castShadow = true;
      pinGroup.add(head);

      const pinColors = ['#4285f4', '#ea4335', '#fbbc04', '#34a853'];
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        const arc = new THREE.Mesh(
          new THREE.TorusGeometry(0.11, 0.012, 8, 12, Math.PI / 2),
          mat(pinColors[i], { emissive: pinColors[i], emissiveIntensity: .5 })
        );
        arc.rotation.x = Math.PI / 2;
        arc.rotation.z = angle;
        arc.position.set(Math.cos(angle) * 0.2, 0.02, Math.sin(angle) * 0.2);
        pinGroup.add(arc);
      }
      return pinGroup;
    }

    function createGoogleDiorama() {
      const g = new THREE.Group();

      box(g, 'dark cell plinth', 0, -0.13, 0, gx(4.8), .26, gx(4.3), M.base);
      box(g, 'cell platform', 0, .02, 0, gx(4.35), .12, gx(3.85), M.platform);
      box(g, 'front road', 0, .105, 1.36, gx(4.0), .04, gx(.62), M.road);
      box(g, 'side road L', -1.5, .11, -1.2, 0.4, .04, 1.8, M.road);
      box(g, 'side road R', 1.5, .11, -1.2, 0.4, .04, 1.8, M.road);
      box(g, 'crosswalk 1', -1.1, .135, 1.36, .08, .012, .5, M.whiteAccent);
      box(g, 'crosswalk 2', -.9, .135, 1.36, .08, .012, .5, M.whiteAccent);
      box(g, 'crosswalk 3', -.7, .135, 1.36, .08, .012, .5, M.whiteAccent);

      box(g, 'Googleplex main tower', 0.0, 1.0, -0.5, 1.8, 2.0, 1.4, M.whiteAccent);
      box(g, 'rooftop garden', 0.0, 2.04, -0.5, 1.85, 0.06, 1.45, M.grass);

      const rooftopTrees = [
        [-0.7, -0.9], [-0.3, -0.9], [0.3, -0.9], [0.7, -0.9],
        [-0.5, -0.1], [0.5, -0.1]
      ];
      rooftopTrees.forEach(([rx, rz]) => {
        cyl(g, 'rooftop tree trunk', rx, 2.05, -0.5 + rz, 0.02, 0.08, mat('#5a3a20', { roughness: .8 }), 8);
        sphere(g, 'rooftop tree crown', rx, 2.22, -0.5 + rz, 0.08, M.grass);
      });

      box(g, 'HQ accent stripe blue', 0.0, 0.55, 0.205, 1.85, 0.04, 0.01, M.googleBlue);
      box(g, 'HQ accent stripe red', 0.0, 0.9, 0.205, 1.85, 0.04, 0.01, M.googleRed);
      box(g, 'HQ accent stripe yellow', 0.0, 1.25, 0.205, 1.85, 0.04, 0.01, M.googleYellow);
      box(g, 'HQ accent stripe green', 0.0, 1.6, 0.205, 1.85, 0.04, 0.01, M.googleGreen);

      const winCols = 8;
      const winRows = 6;
      const winW = 0.16;
      const winH = 0.22;
      const winGapX = 0.04;
      const winGapY = 0.06;
      const totalW = winCols * winW + (winCols - 1) * winGapX;
      const totalH = winRows * winH + (winRows - 1) * winGapY;
      const startX = 0 - totalW / 2 + winW / 2;
      const startY = 1.0 - totalH / 2 + winH / 2;

      const floorWindows = [];
      for (let row = 0; row < winRows; row++) {
        for (let col = 0; col < winCols; col++) {
          const x = startX + col * (winW + winGapX);
          const y = startY + row * (winH + winGapY);
          const w = box(g, `front window ${row}-${col}`, x, y, 0.215, winW, winH, 0.02, M.warmWindow.clone());
          floorWindows.push({ mesh: w, row, col });
        }
      }

      box(g, 'HQ left glass wall', -0.91, 1.0, -0.5, 0.03, 2.0, 1.3, M.glass);
      box(g, 'HQ right glass wall', 0.91, 1.0, -0.5, 0.03, 2.0, 1.3, M.glass);
      box(g, 'HQ lobby glass', 0.0, 0.2, 0.22, 1.4, 0.3, 0.04, M.glassDark);
      box(g, 'HQ lobby canopy', 0.0, 0.4, 0.32, 1.5, 0.04, 0.2, M.whiteAccent);

      g.add(planeWith(makeGoogleLogoTexture(), 0.0, 1.5, 0.215, 1.4, 0.34, 0.45));
      g.add(planeWith(makeGoogleLogoTexture(), 0.0, 0.32, 0.243, 0.7, 0.18, 0.4));

      const rooftopGoogleSign = planeWith(makeGoogleLogoTexture(), 0.0, 2.55, 0.1, 1.5, 0.56, 0.5);
      rooftopGoogleSign.rotation.x = -Math.PI / 9;
      g.add(rooftopGoogleSign);
      box(g, 'yt sign post L', -0.5, 2.3, 0.05, 0.04, 0.4, 0.04, M.darkMetal);
      box(g, 'yt sign post R', 0.5, 2.3, 0.05, 0.04, 0.4, 0.04, M.darkMetal);

      box(g, 'Google Cloud building', 1.5, 0.5, -0.5, 0.9, 1.0, 1.4, M.silver);
      box(g, 'Cloud building accent', 1.5, 0.96, -0.5, 0.95, 0.08, 1.45, M.googleBlue);

      const cloudSign = planeWith(makeGoogleCloudLogoTexture(), 1.96, 0.55, -0.5, 0.55, 0.22, 0.35);
      cloudSign.rotation.y = -Math.PI / 2;
      g.add(cloudSign);

      const cloudDishPivot = new THREE.Group();
      cloudDishPivot.position.set(1.5, 1.0, -0.5);
      g.add(cloudDishPivot);
      const cloudMount = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2, 8), M.darkMetal);
      cloudMount.position.y = 0.1;
      cloudDishPivot.add(cloudMount);
      const cloudDish = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2.2),
        M.silver
      );
      cloudDish.rotation.x = Math.PI;
      cloudDish.position.y = 0.22;
      cloudDishPivot.add(cloudDish);
      const cloudAnt = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.3, 8), M.darkMetal);
      cloudAnt.position.y = 0.38;
      cloudDishPivot.add(cloudAnt);
      const cloudDishLed = new THREE.Mesh(
        new THREE.SphereGeometry(0.022, 12, 8),
        new THREE.MeshBasicMaterial({ color: '#4285f4' })
      );
      cloudDishLed.position.y = 0.52;
      cloudDishPivot.add(cloudDishLed);

      const solarPanels = [];
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 4; col++) {
          solarPanels.push(
            box(g, `solar ${row}-${col}`, 1.5 - 0.27 + col * 0.18, 1.02, -0.5 - 0.27 + row * 0.18, 0.12, 0.02, 0.18, M.solarPanel)
          );
        }
      }

      const serverRacks = [];
      [[-0.4], [0], [0.4]].forEach(([dz]) => {
        serverRacks.push(createServerRack(g, 1.5, 1.35, -0.5 + dz));
      });

      cyl(g, 'cooling tower 1', 1.3, 0.85, -1.1, 0.08, 0.3, M.darkMetal, 16);
      cyl(g, 'cooling tower cap 1', 1.3, 1.145, -1.1, 0.1, 0.05, M.silver, 16);
      cyl(g, 'cooling tower 2', 1.7, 0.85, -1.1, 0.08, 0.3, M.darkMetal, 16);
      cyl(g, 'cooling tower cap 2', 1.7, 1.145, -1.1, 0.1, 0.05, M.silver, 16);
      box(g, 'Cloud front glass', 1.5, 0.5, 0.21, 0.8, 0.6, 0.03, M.glass);

      const dataFlowLines = [];
      for (let i = 0; i < 5; i++) {
        dataFlowLines.push(
          box(g, `data flow ${i}`, 1.5 - 0.32 + i * 0.16, 0.5, 0.21, 0.02, 0.5, 0.02, M.mapDataLine.clone())
        );
      }

      cyl(g, 'comm tower base', 1.92, 0, -0.5, 0.04, 0.4, M.darkMetal, 8);
      cyl(g, 'comm tower mid', 1.92, 0.4, -0.5, 0.025, 0.3, M.darkMetal, 8);
      cyl(g, 'comm tower top', 1.92, 0.7, -0.5, 0.015, 0.2, M.darkMetal, 8);
      const commLed = sphere(g, 'comm led', 1.92, 0.85, -0.5, 0.02, new THREE.MeshBasicMaterial({ color: '#34a853' }));

      const mapsPin = createMapsPin(g, 1.85, 1.1, 0.8, 1.0);

      box(g, 'Android building', -1.5, 0.4, -0.5, 0.9, 0.8, 1.4, M.whiteAccent);
      box(g, 'Android roof accent', -1.5, 0.82, -0.5, 0.95, 0.06, 1.45, M.androidGreen);
      createAndroidHead(g, -1.5, 0.85, -0.5, 0.9);
      box(g, 'Android front glass', -1.5, 0.4, 0.21, 0.8, 0.5, 0.03, M.glassDark);

      const appIcons = [
        { text: 'YT', bg: '#ff0000', color: '#ffffff', x: -1.8 },
        { text: 'M', bg: '#ea4335', color: '#ffffff', x: -1.6 },
        { text: 'G', bg: '#4285f4', color: '#ffffff', x: -1.4 },
        { text: 'P', bg: '#34a853', color: '#ffffff', x: -1.2 }
      ];
      appIcons.forEach(app => {
        g.add(planeWith(makeSimpleSign(app.text, app.bg, app.color), app.x, 0.4, 0.225, 0.12, 0.12, 0.4));
      });
      const andSign = planeWith(makeSimpleSign('Android', '#ffffff', '#3ddc84'), -1.96, 0.5, -0.5, 0.5, 0.18, 0.3);
      andSign.rotation.y = Math.PI / 2;
      g.add(andSign);

      const ytThumbs = [];
      [
        { x: -0.9, rotY: Math.PI / 12 },
        { x: -0.3, rotY: 0 },
        { x: 0.3, rotY: -Math.PI / 12 }
      ].forEach((spec, i) => {
        const thumb = planeWith(makeYouTubeThumbnailTexture(i), spec.x, 0.55, 0.55, 0.45, 0.28, 0.6);
        thumb.rotation.y = spec.rotY;
        g.add(thumb);
        box(g, `yt thumb stand ${i}`, spec.x, 0.35, 0.55, 0.04, 0.18, 0.04, M.darkMetal);
        ytThumbs.push(thumb);
      });

      const ytBeam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.15, 3.5, 12, 1, true),
        M.skyBeamYt
      );
      ytBeam.position.set(0.0, 4.4, 0.1);
      ytBeam.castShadow = false;
      g.add(ytBeam);

      const logoCubes = [];
      const cubeColors = [M.googleBlue, M.googleRed, M.googleYellow, M.googleGreen];
      const cubePositions = [[-0.18, 0.18], [0.18, 0.18], [-0.18, -0.18], [0.18, -0.18]];
      cubePositions.forEach(([px, pz], i) => {
        const cube = box(g, `Google logo cube ${i}`, px + 0.5, 0.28, 1.05 + pz * 0.5, 0.1, 0.1, 0.1, cubeColors[i]);
        logoCubes.push({ mesh: cube, phase: i * 0.5 });
      });

      const dishPivot = new THREE.Group();
      dishPivot.position.set(-0.4, 1.4, -1.6);
      g.add(dishPivot);
      const dish = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2.2),
        M.silver
      );
      dish.rotation.x = Math.PI;
      dishPivot.add(dish);
      const dishAntenna = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.22, 8), M.darkMetal);
      dishAntenna.position.set(0, 0.13, 0);
      dishPivot.add(dishAntenna);
      const dishLed = new THREE.Mesh(
        new THREE.SphereGeometry(0.028, 12, 8),
        new THREE.MeshBasicMaterial({ color: '#ff3355' })
      );
      dishLed.position.set(0, 0.26, 0);
      dishPivot.add(dishLed);

      const globe = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 24, 16),
        new THREE.MeshStandardMaterial({
          color: '#1a4d8a', emissive: '#3a78ff', emissiveIntensity: 0.6,
          roughness: 0.4, metalness: 0.3
        })
      );
      globe.position.set(0.4, 0.25, -1.6);
      g.add(globe);
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2;
        sphere(g, `globe node ${i}`,
          0.4 + Math.cos(angle) * 0.135,
          0.25 + (i % 2) * 0.05,
          -1.6 + Math.sin(angle) * 0.135,
          0.012,
          new THREE.MeshBasicMaterial({ color: '#ffffff' })
        );
      }

      const waymoCar = new THREE.Group();
      waymoCar.position.set(-0.5, 0.18, 1.3);
      g.add(waymoCar);
      box(waymoCar, 'waymo body', 0, 0, 0, 0.25, 0.08, 0.13, M.whiteAccent);
      box(waymoCar, 'waymo roof', 0, 0.07, 0, 0.18, 0.05, 0.12, M.whiteAccent);
      const lidar = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.04, 12), M.darkMetal);
      lidar.position.set(0, 0.13, 0);
      lidar.castShadow = true;
      waymoCar.add(lidar);
      [[-0.05, 0.13], [0.05, 0.13]].forEach(([hx, hz]) => {
        const hl = new THREE.Mesh(
          new THREE.SphereGeometry(0.012, 8, 6),
          new THREE.MeshBasicMaterial({ color: '#fff8c0' })
        );
        hl.position.set(hx, 0, hz);
        waymoCar.add(hl);
      });

      box(g, 'google truck cabin', 0.6, 0.24, 1.3, 0.32, 0.28, 0.32, M.googleBlue);
      box(g, 'google truck cargo', 0.97, 0.28, 1.3, 0.58, 0.34, 0.34, M.whiteAccent);
      g.add(planeWith(makeGoogleLogoTexture(), 0.97, 0.3, 1.48, 0.4, 0.12, 0.3));

      const peopleColors = ['#ea4335', '#fbbc04', '#34a853', '#4285f4', '#ffffff'];
      for (let i = 0; i < 8; i++) {
        const px = -1.0 + (i % 4) * 0.35;
        const pz = 0.85 + Math.floor(i / 4) * 0.15;
        const person = new THREE.Mesh(
          new THREE.BoxGeometry(0.04, 0.1, 0.04),
          mat(peopleColors[i % peopleColors.length], { roughness: 0.7 })
        );
        person.position.set(px, 0.18, pz);
        person.castShadow = true;
        g.add(person);
      }

      tree(g, -2.0, -1.6, .45);
      tree(g, 2.0, -1.85, .42);
      tree(g, 0.0, -1.95, .42);

      const heroGlow = new THREE.PointLight('#fff2c8', 0.7, 3.5);
      heroGlow.position.set(0.0, 1.0, -0.5);
      g.add(heroGlow);
      const rooftopSignGlow = new THREE.PointLight('#fff4e8', 0.75, 3);
      rooftopSignGlow.position.set(0.0, 2.3, 0.3);
      g.add(rooftopSignGlow);
      const mapsGlow = new THREE.PointLight('#ea4335', 0.55, 2.5);
      mapsGlow.position.set(1.85, 1.1, 0.8);
      g.add(mapsGlow);
      const cloudGlow = new THREE.PointLight('#4285f4', 0.8, 3);
      cloudGlow.position.set(1.5, 0.8, -0.5);
      g.add(cloudGlow);
      const androidGlow = new THREE.PointLight('#3ddc84', 0.5, 2);
      androidGlow.position.set(-1.5, 0.8, -0.5);
      g.add(androidGlow);

      g.userData = {
        floorWindows, ytThumbs, ytBeam, rooftopGoogleSign, rooftopSignGlow,
        cloudDishPivot, cloudDishLed, solarPanels, dataFlowLines, commLed,
        mapsPin, mapsGlow, dishPivot, dishLed, globe, serverRacks,
        logoCubes, waymoCar, lidar, cloudGlow
      };
      return g;
    }

    function tree(g, x, z, s = .5) {
      cyl(g, 'tree trunk', x, .04 * s / .5, z, .035, .38 * s / .5, mat('#7a4b2a', { roughness: .8 }), 10);
      const crown = new THREE.Mesh(new THREE.SphereGeometry(.18 * s / .5, 18, 12), M.grass);
      crown.position.set(x, .52 * s / .5, z);
      crown.castShadow = true;
      crown.receiveShadow = true;
      g.add(crown);
    }

    scene.add(new THREE.HemisphereLight('#dceaff', '#1b2430', 1.0));
    const key = new THREE.DirectionalLight('#ffffff', 1.8);
    key.position.set(4.5, 7, 5.5);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -7;
    key.shadow.camera.right = 7;
    key.shadow.camera.top = 7;
    key.shadow.camera.bottom = -7;
    scene.add(key);
    const rim = new THREE.DirectionalLight('#ff5566', 0.5);
    rim.position.set(-4, 4, -5);
    scene.add(rim);

    const google = createGoogleDiorama();
    google.scale.setScalar(1.58);
    scene.add(google);

    const clock = new THREE.Clock();
    const SPEED = 0.4;

    function animate() {
      const t = clock.getElapsedTime() * SPEED;
      const tRaw = clock.getElapsedTime();
      const u = google.userData;

      u.floorWindows.forEach(fw => {
        const wave = 0.4 + 0.6 * Math.max(0, Math.sin(t * 1.2 - fw.row * 0.3 + fw.col * 0.1));
        fw.mesh.material.emissiveIntensity = wave;
      });

      u.ytThumbs.forEach((thumb, i) => {
        thumb.material.emissiveIntensity = 0.5 + 0.3 * Math.sin(t * 1.5 + i * 0.8);
      });

      u.rooftopGoogleSign.material.emissiveIntensity = 0.4 + 0.3 * Math.sin(t * 1.0);
      u.rooftopSignGlow.intensity = 0.65 + 0.25 * Math.sin(t * 1.0);

      u.ytBeam.material.opacity = 0.25 + 0.15 * Math.sin(t * 1.5);
      u.ytBeam.scale.x = u.ytBeam.scale.z = 1 + 0.12 * Math.sin(t * 2);

      u.logoCubes.forEach(c => {
        c.mesh.position.y = 0.28 + Math.abs(Math.sin(t * 1.5 + c.phase)) * 0.04;
      });

      u.cloudDishPivot.rotation.y = t * 0.8;
      u.cloudDishLed.material.color.setHSL(0.58, 1, 0.5 + 0.25 * Math.sin(tRaw * 4));

      u.solarPanels.forEach((panel, i) => {
        panel.material.emissiveIntensity = 0.3 + 0.35 * Math.abs(Math.sin(t * 2 + i * 0.4));
      });

      u.dataFlowLines.forEach((line, i) => {
        line.material.emissiveIntensity = 1.0 + 1.0 * Math.abs(Math.sin(t * 3 + i * 0.5));
        line.material.opacity = 0.35 + 0.35 * Math.abs(Math.sin(t * 2.5 + i * 0.35));
      });

      u.commLed.material.color.setHSL(0.35 + 0.05 * Math.sin(tRaw * 3), 1, 0.5);

      u.mapsPin.position.y = 1.1 + Math.sin(t * 2) * 0.04;
      u.mapsPin.rotation.y = Math.sin(t * 0.8) * 0.08;
      u.mapsGlow.intensity = 0.45 + 0.2 * Math.sin(t * 2.2);

      u.dishPivot.rotation.y = t * 0.6;
      u.dishLed.material.color.setHSL(0, 1, 0.5 + 0.25 * Math.sin(tRaw * 4));

      u.globe.rotation.y = t * 0.8;

      u.serverRacks.forEach(rack => {
        rack.leds.forEach(led => {
          led.mesh.material.emissiveIntensity = 1.5 + 1.5 * Math.abs(Math.sin(t * 4 + led.phase * 3));
        });
      });

      u.lidar.rotation.y = tRaw * 4;
      u.waymoCar.position.x = -0.5 + Math.sin(t * 0.5) * 0.8;

      u.cloudGlow.intensity = 0.7 + 0.15 * Math.sin(t * 2);

      google.rotation.y = Math.sin(t * .25) * .012;

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
