<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA Three-Pillar Diorama · NVDA</title>
  <style>
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: radial-gradient(circle at 50% 18%, #0e1410 0%, #050a08 58%, #02060a 100%);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    }
    #hud {
      position: fixed; left: 20px; top: 18px; z-index: 10;
      color: #f3f7e8;
      background: rgba(8, 12, 8, 0.82);
      border: 1px solid rgba(118, 185, 0, 0.55);
      border-radius: 16px; padding: 13px 16px;
      line-height: 1.5; pointer-events: none;
      box-shadow: 0 18px 40px rgba(0,0,0,.45);
    }
    #hud b { color: #76b900; font-size: 18px; }
    #hud span { color: #c7eaa0; font-size: 13px; }
    #pillars {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      display: flex; gap: 10px; padding: 12px 20px;
      background: rgba(8, 10, 8, 0.94);
      border-top: 1px solid rgba(118, 185, 0, 0.4);
      pointer-events: none;
    }
    #pillars .p {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1px solid #2a3020; background: rgba(20, 24, 18, 0.8);
      font-size: 11px; color: #9aa39a;
    }
    #pillars .p b { display: block; color: #a3e635; font-size: 12px; margin-bottom: 4px; }
    #tip {
      position: fixed; right: 20px; top: 18px; z-index: 10;
      color: #76b900; background: rgba(245, 248, 240, 0.92);
      border-radius: 999px; padding: 9px 14px; font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <b>NVIDIA THREE-PILLAR · v1</b><br />
    <span>Chip Design · RTX GPU Hero · AI Infrastructure</span>
  </div>
  <div id="tip">드래그 회전 · 휠 확대 · 우클릭 이동</div>
  <div id="pillars">
    <div class="p"><b>01 Chip Design</b>팹리스 설계 · CUDA 스택 (디스플레이)</div>
    <div class="p"><b>02 GPU Products</b>RTX Founders Edition (Hero)</div>
    <div class="p"><b>03 AI Infrastructure</b>데이터센터 서버 랙 ×4</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { createNvidia } from './nvidia-diorama-scene.mjs';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#06080a');
    scene.fog = new THREE.Fog('#06080a', 10, 24);

    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(5.2, 4.2, 6.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.2, 0.55, 0.15);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 3.5;
    controls.maxDistance = 12;

    scene.add(new THREE.AmbientLight('#dceaff', 0.35));
    const key = new THREE.DirectionalLight('#ffffff', 0.7);
    key.position.set(2, 6, 3);
    key.castShadow = true;
    scene.add(key);
    const rim = new THREE.DirectionalLight('#76b900', 0.25);
    rim.position.set(-3, 2, -2);
    scene.add(rim);

    const diorama = createNvidia();
    scene.add(diorama);

    const clock = new THREE.Clock();
    function animate() {
      const t = clock.getElapsedTime();
      diorama.userData.tick?.(t);
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
